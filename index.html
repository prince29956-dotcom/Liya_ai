<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liya Smart Voice AI - Secure</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* आपका भेजा हुआ ब्लू नियॉन वॉलपेपर */
            background: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            overflow: hidden;
        }

        /* 🔒 पासवर्ड लॉकर स्क्रीन स्टाइल */
        .locker-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 20, 38, 0.95);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: 0.5s ease;
        }

        .locker-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            width: 85%;
            max-width: 350px;
        }

        .locker-container h2 {
            color: #00d2ff;
            margin-top: 0;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .locker-container input {
            width: 90%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            border: 1px solid rgba(0, 210, 255, 0.3);
            background: rgba(0,0,0,0.3);
            color: white;
            text-align: center;
            font-size: 16px;
            outline: none;
        }

        .locker-container button {
            padding: 10px 25px;
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .locker-container button:hover { background: #00aaff; box-shadow: 0 0 15px rgba(0, 170, 255, 0.5); }

        .error-txt { color: #ff4444; font-size: 13px; margin-top: 5px; display: none; }

        /* ☰ थ्री-लाइन मेनू बटन */
        .menu-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            background: none;
            border: none;
            color: #00d2ff;
            cursor: pointer;
            z-index: 10;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        /* ⚙️ साइड मेनू बार */
        .side-menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 250px;
            height: 100%;
            background: rgba(10, 20, 38, 0.95);
            backdrop-filter: blur(15px);
            box-shadow: 5px 0 25px rgba(0, 0, 0, 0.5);
            transition: 0.3s ease;
            z-index: 9;
            padding: 80px 15px 20px 15px;
            border-right: 1px solid rgba(0, 210, 255, 0.2);
        }

        .side-menu.open { left: 0; }
        .side-menu h3 { color: #00d2ff; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-top: 0; }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #00d2ff, #0088cc);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 25px;
            transition: 0.2s;
        }
        .new-chat-btn:hover { transform: scale(1.02); }

        .menu-option { margin-bottom: 20px; }
        .menu-option label { display: block; margin-bottom: 8px; font-size: 14px; color: #ccc; }
        
        .menu-option select, .menu-option input {
            width: 90%;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 8px;
            outline: none;
        }

        /* API Key सेट बटन */
        .save-key-btn {
            width: 98%;
            padding: 8px;
            background: #004422;
            color: #00ff66;
            border: 1px solid #00ff66;
            border-radius: 6px;
            margin-top: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .save-key-btn:hover { background: #006633; }

        /* 💎 मुख्य चैट कंटेनर (Glassmorphism) */
        .chat-container {
            width: 90%;
            max-width: 480px;
            height: 80vh;
            background: rgba(10, 22, 44, 0.75);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.25);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 210, 255, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        h2 { 
            color: #00d2ff; 
            margin: 0 0 10px 0; 
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
            text-align: center;
            font-size: 22px;
        }

        .ai-status-row { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 15px; }

        .avatar-container {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #00d2ff;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }

        /* 🌊 जादुई लिक्विड शेप */
        .liquid-container { width: 55px; height: 55px; background: rgba(0, 210, 255, 0.15); border: 2px solid #00d2ff; border-radius: 50%; position: relative; overflow: hidden; }
        .liquid-wave { position: absolute; bottom: 0; left: -50%; width: 200%; height: 100%; background: linear-gradient(180deg, #00ffff, #0088cc); border-radius: 40%; animation: fluidMove 4s linear infinite; transform: translateY(35%); transition: transform 0.5s ease; }
        .speaking .liquid-wave { animation: fluidMove 0.8s linear infinite !important; transform: translateY(15%) scale(1.1); background: linear-gradient(180deg, #00ffaa, #00ffff); }

        @keyframes fluidMove { 0% { transform: translateY(35%) rotate(0deg); } 100% { transform: translateY(35%) rotate(360deg); } }

        /* चैट हिस्ट्री */
        .chat-history { flex: 1; background: rgba(0, 0, 0, 0.4); border-radius: 16px; padding: 15px; overflow-y: auto; margin-bottom: 15px; border: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; gap: 12px; }

        .msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .user-msg { background: #0088cc; color: white; align-self: flex-end; border-bottom-right-radius: 2px; box-shadow: 0 3px 10px rgba(0,136,204,0.3); }
        .ai-msg { background: rgba(255, 255, 255, 0.1); color: #ffffff; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid rgba(255,255,255,0.05); }

        .status-badge { font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; margin: 0 auto 10px auto; }
        .online-status { background: #004422; color: #00ff66; }
        .offline-status { background: #550000; color: #ff4444; }

        /* इनपुटिया और प्लस बटन */
        .input-area { display: flex; gap: 8px; position: relative; align-items: center; }
        
        .attach-btn { width: 42px; height: 42px; background: rgba(255, 255, 255, 0.1); color: #00d2ff; border: 1px solid rgba(0, 210, 255, 0.3); border-radius: 10px; font-size: 22px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        
        .attach-popup { display: none; position: absolute; bottom: 55px; left: 0; background: rgba(15, 28, 54, 0.95); border: 1px solid rgba(0, 210, 255, 0.4); border-radius: 12px; padding: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); backdrop-filter: blur(10px); z-index: 5; flex-direction: column; gap: 8px; }
        .attach-popup.show { display: flex; }
        
        .popup-option { background: none; border: none; color: white; padding: 8px 16px; text-align: left; cursor: pointer; font-size: 14px; border-radius: 6px; display: flex; align-items: center; gap: 8px; }
        .popup-option:hover { background: rgba(0, 210, 255, 0.2); color: #00d2ff; }

        input[type="text"] { flex: 1; padding: 12px; border: none; border-radius: 10px; background: rgba(255, 255, 255, 0.07); color: white; border: 1px solid rgba(0, 210, 255, 0.2); outline: none; height: 18px; }
        input:focus { border-color: #00d2ff; background: rgba(255, 255, 255, 0.12); }

        .send-btn { padding: 12px 18px; background: #0088cc; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; height: 42px; }
        
        #galleryInput, #cameraInput { display: none; }
    </style>
</head>
<body>

    <div class="locker-screen" id="lockerScreen">
        <div class="locker-container">
            <h2>LIYA AI LOCKER</h2>
            <p style="font-size: 14px; color: #ccc;">कृपया आगे बढ़ने के लिए पासवर्ड डालें</p>
            <input type="password" id="passInput" placeholder="Password यहाँ लिखें...">
            <button onclick="checkPassword()">Unlock</button>
            <div class="error-txt" id="errorTxt">गलत पासवर्ड! दोबारा कोशिश करें।</div>
        </div>
    </div>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <div class="side-menu" id="sideMenu">
        <h3>सेटिंग्स</h3>
        
        <button class="new-chat-btn" onclick="startNewChat()">+ New Chat</button>

        <div class="menu-option">
            <label for="langSelect">लिया की भाषा (Voice Language):</label>
            <select id="langSelect">
                <option value="hi-IN">हिन्दी (Hindi)</option>
                <option value="en-IN">इंगलिश-इंडिया (Hinglish)</option>
                <option value="en-US">अमेरिकन इंग्लिश (English US)</option>
            </select>
        </div>

        <div class="menu-option">
            <label for="apiKeyInput">API KEY:</label>
            <input type="password" id="apiKeyInput" placeholder="अपनी Gemini API Key डालें...">
            <button class="save-key-btn" onclick="setTempApiKey()">Apply Key</button>
        </div>
    </div>

    <div class="chat-container">
        <h2>LIYA VOICE AI</h2>
        <div id="statusBadge" class="status-badge online-status">ऑनलाइन मोड</div>

        <div class="ai-status-row" id="aiStatusRow">
            <div class="avatar-container">
                <img src="https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=200" alt="Avatar">
            </div>
            <div class="liquid-container">
                <div class="liquid-wave"></div>
            </div>
        </div>

        <div class="chat-history" id="chatHistory">
            <div class="msg ai-msg">नमस्ते प्रिंस सर! मैं लिया हूँ। बताइए आज मैं आपकी क्या मदद करूँ?</div>
        </div>
        
        <div class="input-area">
            <button class="attach-btn" onclick="toggleAttachPopup()">+</button>
            
            <div class="attach-popup" id="attachPopup">
                <button class="popup-option" onclick="openCamera()">📷 Camera</button>
                <button class="popup-option" onclick="openGallery()">🖼️ Gallery</button>
            </div>

            <input type="file" id="galleryInput" accept="image/*" onchange="handleFileSelect(event, 'Gallery')">
            <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handleFileSelect(event, 'Camera')">

            <input type="text" id="userInput" placeholder="यहाँ अपना सवाल लिखें...">
            <button class="send-btn" onclick="askAssistant()">पूछें</button>
        </div>
    </div>

    <script>
        const chatHistory = document.getElementById("chatHistory");
        const aiStatusRow = document.getElementById("aiStatusRow");
        const statusBadge = document.getElementById("statusBadge");
        const sideMenu = document.getElementById("sideMenu");
        const langSelect = document.getElementById("langSelect");
        const attachPopup = document.getElementById("attachPopup");
        const apiKeyInput = document.getElementById("apiKeyInput");

        let isOnline = navigator.onLine;
        
        // 🔒 API Key को सिर्फ इस लाइव सेशन (अस्थायी मेमोरी) में रखने के लिए वेरिएबल
        let currentSessionKey = "";

        // पेज लोड होते ही अब कोई चाबी पुराने स्टोरेज से लोड नहीं होगी
        window.onload = () => {
            apiKeyInput.value = "";
        }

        // 🔒 पासवर्ड चेक करने का फंक्शन
        function checkPassword() {
            const passInput = document.getElementById("passInput").value;
            const errorTxt = document.getElementById("errorTxt");
            
            if (passInput === "Prince233227!@#₹%^&*()") {
                document.getElementById("lockerScreen").style.opacity = "0";
                setTimeout(() => {
                    document.getElementById("lockerScreen").style.display = "none";
                }, 500);
            } else {
                errorTxt.style.display = "block";
            }
        }

        // 🔑 API Key को सिर्फ चालू सत्र (अस्थायी मेमोरी) में सेट करने का फंक्शन
        function setTempApiKey() {
            const key = apiKeyInput.value.trim();
            if(key) {
                currentSessionKey = key;
                alert("API Key अस्थायी रूप से चालू कर दी गई है! पेज बंद या रीफ्रेश करते ही यह अपने आप डिलीट हो जाएगी।");
                sideMenu.classList.remove('open');
            } else {
                alert("कृपया पहले बॉक्स में वैध API Key डालें!");
            }
        }

        function toggleMenu() { sideMenu.classList.toggle('open'); }
        function toggleAttachPopup() { attachPopup.classList.toggle('show'); }

        function startNewChat() {
            chatHistory.innerHTML = `<div class="msg ai-msg">नमस्ते प्रिंस सर! मैंने नई चैट शुरू कर दी है। पूछिए, क्या सहायता चाहिए?</div>`;
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            aiStatusRow.classList.remove('speaking');
            sideMenu.classList.remove('open');
        }

        function openGallery() { document.getElementById("galleryInput").click(); attachPopup.classList.remove('show'); }
        function openCamera() { document.getElementById("cameraInput").click(); attachPopup.classList.remove('show'); }

        function handleFileSelect(event, source) {
            const file = event.target.files[0];
            if (file) {
                appendMessage(`<i>📁 ${source} से फोटो सिलेक्ट की गई: ${file.name}</i>`, "user");
                appendMessage(`लिया: सर, मुझे आपकी फाइल मिल गई है!`, "ai");
                speakText("सर, मुझे आपकी फाइल मिल गई है!");
            }
        }

        document.addEventListener('click', (e) => {
            if (!sideMenu.contains(e.target) && !e.target.classList.contains('menu-btn') && sideMenu.classList.contains('open')) {
                sideMenu.classList.remove('open');
            }
            if (!e.target.classList.contains('attach-btn') && !attachPopup.contains(e.target) && attachPopup.classList.contains('show')) {
                attachPopup.classList.remove('show');
            }
        });

        window.addEventListener('online', () => { isOnline = true; statusBadge.innerHTML = "ऑनलाइन मोड"; statusBadge.className = "status-badge online-status"; });
        window.addEventListener('offline', () => { isOnline = false; statusBadge.innerHTML = "ऑफ़लाइन मोड"; statusBadge.className = "status-badge offline-status"; });

        const offlineResponses = {
            "hello": "नमस्ते प्रिंस सर! इंटरनेट बंद है, फिर भी मैं आपकी सेवा में हाजिर हूँ।",
            "hi": "हेलो सर! बताइए ऑफ़लाइन मोड में मैं आपकी क्या मदद करूँ?",
            "तुम कौन हो": "मैं लिया हूँ, जिसे मेरे बॉस प्रिंस कुमार गोंड सर ने बनाया है।",
            "तुम्हारा मालिक कौन है": "मेरे मालिक प्रिंस कुमार गोंड सर हैं।"
        };

        function appendMessage(text, sender) {
            const msgDiv = document.createElement("div");
            msgDiv.classList.add("msg", sender === "user" ? "user-msg" : "ai-msg");
            msgDiv.innerHTML = text;
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight; 
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                let cleanText = text.replace(/[*#_`~\[\]]/g, '');
                const sentences = cleanText.split(/[।!?.]+/).map(s => s.trim()).filter(s => s.length > 0);
                
                if (sentences.length === 0) return;
                let currentIdx = 0;

                function speakNext() {
                    if (currentIdx >= sentences.length) {
                        aiStatusRow.classList.remove('speaking');
                        return;
                    }
                    const utterance = new SpeechSynthesisUtterance(sentences[currentIdx]);
                    utterance.lang = langSelect.value; 

                    const voices = window.speechSynthesis.getVoices();
                    const selectedVoice = voices.find(voice => voice.lang.includes(langSelect.value.split('-')[0]));
                    if (selectedVoice) utterance.voice = selectedVoice;

                    utterance.onstart = () => aiStatusRow.classList.add('speaking');
                    utterance.onend = () => { currentIdx++; speakNext(); };
                    utterance.onerror = () => { currentIdx++; speakNext(); };

                    window.speechSynthesis.speak(utterance);
                }
                speakNext();
            }
        }

        async function askAssistant() {
            const inputField = document.getElementById("userInput");
            const query = inputField.value.trim();
            if (!query) return;

            inputField.value = "";
            appendMessage(query, "user");

            const lowerQuery = query.toLowerCase();
            if (offlineResponses[lowerQuery]) {
                appendMessage(offlineResponses[lowerQuery], "ai");
                speakText(offlineResponses[lowerQuery]);
                return;
            }

            if (!isOnline) {
                appendMessage("सर, अभी इंटरनेट बंद है। कृपया इंटरनेट चालू करें।", "ai");
                speakText("सर, अभी इंटरनेट बंद है। कृपया इंटरनेट चालू करें।");
                return;
            }

            // 🔒 कोड में सेव्ड लोकल स्टोरेज के बजाय अब हम सिर्फ चालू वेरिएबल की चाबी उठा रहे हैं
            const ACTIVE_API_KEY = currentSessionKey;
            
            if(!ACTIVE_API_KEY) {
                appendMessage("सर, कृपया पहले थ्री-लाइन मेनू (☰) में जाकर अपनी Gemini API Key डालें और Apply Key करें।", "ai");
                speakText("सर, कृपया पहले थ्री लाइन मेनू में जाकर अपनी जेमिनी एपीआई की डालें।");
                return;
            }

            const DYNAMIC_API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${ACTIVE_API_KEY}`;

            let languageInstruction = "Answer in clean, friendly Hindi language.";
            if (langSelect.value === "en-US" || langSelect.value === "en-IN") {
                languageInstruction = "Answer in clear, friendly English language.";
            }

            const systemPrompt = `Your name is Liya. You are a personal female AI assistant created by Prince Kumar Gond Sir. ${languageInstruction} Keep your responses short and concise. Do not use markdown characters like stars or hashes.`;

            try {
                const response = await fetch(DYNAMIC_API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: [{ text: `${systemPrompt}\n\nQuestion: ${query}` }] }]
                    })
                });

                const data = await response.json();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const aiReply = data.candidates[0].content.parts[0].text;
                    appendMessage(aiReply, "ai"); 
                    speakText(aiReply); 
                } else {
                    appendMessage("क्षма करें सर, मैं समझ नहीं पाई। क्या आपकी API Key सही है?", "ai");
                }
            } catch (error) {
                appendMessage("कनेक्शन एरर। कृपया अपनी API Key चेक करें या इंटरनेट देखें।", "ai");
            }
        }

        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => {};
        }
    </script>
</body>
</html>
